# Pre-commit hooks — run locally before every commit.
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Hooks here are the minimum viable set: secrets scan + basic hygiene.
# Keep them FAST so commits don't stall.

repos:
  # Secret scanning — primary defense against accidental key commits.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Basic file hygiene — catches the stuff everyone forgets.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  # Python lint — matches CI config.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
