# rosclaw-mujoco Docker Compose
# 기존 rosbridge 설정 유지 + LQR 노드 + ROSClaw discovery 추가
# (Compose v2 dropped the top-level `version` key — leaving it caused a warning.)

services:
  # ── ROS2 + rosbridge WebSocket (기존) ──
  ros2_bridge:
    build:
      # Context is the repo root (not ./docker) because the Dockerfile does
      # `COPY requirements-ros2.txt` which lives at the repo root.
      context: .
      dockerfile: docker/Dockerfile.ros2
    platform: linux/arm64
    container_name: segway_ros2
    environment:
      - ROS_DOMAIN_ID=0
    # rosbridge has NO authentication — bind to loopback so LAN peers cannot
    # subscribe to /segway/state or publish cmd_reference / update_gains.
    # If you ever need remote access, front it with an auth proxy (e.g. nginx
    # + bearer token) instead of exposing 0.0.0.0:9090.
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./ros2_ws:/root/ros2_ws:ro
    command: >
      bash -lc "
        source /opt/ros/humble/setup.bash;
        ros2 launch rosbridge_server rosbridge_websocket_launch.xml
          port:=9090
          unregister_timeout:=60.0;
      "
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9090"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── LQR Controller ROS2 Node (NEW) ──
  lqr_controller:
    build:
      # Context is the repo root (not ./docker) because the Dockerfile does
      # `COPY requirements-ros2.txt` which lives at the repo root.
      context: .
      dockerfile: docker/Dockerfile.ros2
    platform: linux/arm64
    container_name: segway_lqr
    depends_on:
      ros2_bridge:
        condition: service_healthy
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./ros2_ws:/root/ros2_ws:ro
    command: >
      bash -lc "
        source /opt/ros/humble/setup.bash;
        python3 /root/ros2_ws/src/segway_controller/lqr_controller_node.py
          --ros-args --params-file /root/ros2_ws/src/segway_controller/params.yaml;
      "

  # ── Gemini NLP Node (NEW — Natural Language Control) ──
  gemini_nlp:
    build:
      # Context is the repo root (not ./docker) because the Dockerfile does
      # `COPY requirements-ros2.txt` which lives at the repo root.
      context: .
      dockerfile: docker/Dockerfile.ros2
    platform: linux/arm64
    container_name: segway_nlp
    depends_on:
      ros2_bridge:
        condition: service_healthy
    environment:
      - ROS_DOMAIN_ID=0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./ros2_ws:/root/ros2_ws:ro
    command: >
      bash -lc "
        source /opt/ros/humble/setup.bash;
        python3 /root/ros2_ws/src/segway_controller/gemini_nlp_node.py;
      "

  # ── ROSClaw Discovery Node (NEW — for OpenClaw) ──
  rosclaw_discovery:
    build:
      # Context is the repo root (not ./docker) because the Dockerfile does
      # `COPY requirements-ros2.txt` which lives at the repo root.
      context: .
      dockerfile: docker/Dockerfile.ros2
    platform: linux/arm64
    container_name: segway_discovery
    depends_on:
      ros2_bridge:
        condition: service_healthy
    environment:
      - ROS_DOMAIN_ID=0
    volumes:
      - ./ros2_ws:/root/ros2_ws:ro
    command: >
      bash -lc "
        source /opt/ros/humble/setup.bash;
        python3 /root/ros2_ws/src/segway_controller/discovery_node.py;
      "
